- name: catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable the Node.js DNF module
    ansible.builtin.dnf:
      name: "nodejs"
      state: disabled
  - name: enable the Node.js DNF module
    ansible.builtin.dnf:
      name: "nodejs:20"
      state: enabled
  - name: install the Node.js DNF module
    ansible.builtin.dnf:
      name: "nodejs"
      state: installed
  -  name: user addition
     ansible.builtin.user:
      name: roboshop
      system: true
      shell: /sbin/nologin
  