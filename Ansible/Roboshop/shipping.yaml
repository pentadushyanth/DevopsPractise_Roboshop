- name: shipping server
  hosts: shipping
  become: yes
  tasks:
  - name: Install multiple versions of Maven and MySQL
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql
  -  name: user addition
     ansible.builtin.user:
      name: roboshop
      system: true
      shell: /sbin/nologin
  - name: Creates directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: Download zip file 
    ansible.builtin.unarchive:
      src:  https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /app
      remote_src: yes
  - name: mvn clean package
    ansible.builtin.command: mvn clean package
  - name: move shipping.jar file
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar 
  - name: Copy shipping service
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service
  - name: reload the daemon
    ansible.builtin.systemd_service:
      daemon_reload: true
      name: shipping
  - name: start and Enable shipping
    ansible.builtin.service:
      name: shipping
      enabled: yes
  - name: Check if schema tables exist
    community.mysql.mysql_query:
      login_host: "{{ mysql }}"
      login_user: root
      login_password: RoboShop@1
      query: "SHOW TABLES LIKE 'users';"
    register: schema_check 
  - name: Import schema
    community.mysql.mysql_db:
      login_host: "{{ mysql }}"
      login_user: root
      login_password: RoboShop@1
      name: roboshop
      state: import
      target: /app/db/schema.sql
      when: schema_check.query_result[0] | length == 0  
  - name: Check if app user exists
    community.mysql.mysql_query:
      login_host: "{{ mysql }}"
      login_user: root
      login_password: RoboShop@1
      query: "SELECT User FROM mysql.user WHERE User='app_user';"
    register: user_check
  - name: Run app-user.sql if user not present
    ansible.builtin.shell: mysql -h {{ mysql }} -uroot -pRoboShop@1 < /app/db/app-user.sql
    when: user_check.query_result[0] | length == 0
  - name: Check if master data exists
    community.mysql.mysql_query:
      login_host: "{{ mysql }}"
      login_user: root
      login_password: RoboShop@1
      query: "SELECT COUNT(*) AS count FROM users;"
    register: master_data_check
  - name: Load master data
    ansible.builtin.shell: mysql -h {{ mysql }} -uroot -pRoboShop@1 < /app/db/master-data.sql
    when: master_data_check.query_result[0] | length == 0
  - name: Restart service shipping
    ansible.builtin.service:
      name: shipping
      state: restarted


    
